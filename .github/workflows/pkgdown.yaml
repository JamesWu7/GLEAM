name: pkgdown

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libglpk40 libglpk-dev
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: website
          dependencies: '"hard"'
      - name: Clean stale site output
        run: pkgdown::clean_site(force = TRUE)
        shell: Rscript {0}
      - name: Generate homepage figures from package workflows
        run: source("scripts/generate_homepage_figures.R")
        shell: Rscript {0}
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
      - name: Sync static homepage assets into built site
        run: |
          mkdir -p docs/assets
          cp -R assets/. docs/assets/
      - name: Validate tutorial entry pages for branch-based Pages
        run: |
          test -f docs/index.html
          test -f docs/articles/index.html
          test -f docs/articles/GLEAM_quickstart_scrna.html
          test -f docs/articles/GLEAM_quickstart_spatial.html
          test -f docs/articles/GLEAM_full_scrna_workflow.html
          test -f docs/articles/GLEAM_full_spatial_workflow.html
          test -f docs/reference/index.html
          test -f docs/.nojekyll
