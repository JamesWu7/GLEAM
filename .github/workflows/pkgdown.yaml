name: pkgdown

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: website
          dependencies: '"hard"'
      - name: Clean stale site output
        run: pkgdown::clean_site(force = TRUE)
        shell: Rscript {0}
      - name: Generate homepage figures from package workflows
        run: source("scripts/generate_homepage_figures.R")
        shell: Rscript {0}
      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
      - name: Sync static homepage assets into built site
        run: |
          mkdir -p docs/assets
          cp -R assets/. docs/assets/
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
