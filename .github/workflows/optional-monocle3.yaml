name: optional-monocle3

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  trajectory-monocle3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::BiocManager, any::testthat, any::remotes, any::devtools
          dependencies: hard
      - name: Install monocle3 (optional backend)
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          options(Ncpus = max(1L, parallel::detectCores(logical = TRUE) - 1L))
          if (!requireNamespace("BiocManager", quietly = TRUE))
            install.packages("BiocManager")

          try(BiocManager::install(version = "3.21", ask = FALSE), silent = TRUE)
          try(
            BiocManager::install(c(
              "BiocGenerics", "DelayedArray", "DelayedMatrixStats",
              "limma", "lme4", "S4Vectors", "SingleCellExperiment",
              "SummarizedExperiment", "batchelor", "HDF5Array",
              "ggrastr"
            ), ask = FALSE, update = FALSE),
            silent = TRUE
          )

          if (!requireNamespace("remotes", quietly = TRUE))
            install.packages("remotes")

          if (!requireNamespace("devtools", quietly = TRUE))
            install.packages("devtools")

          try(remotes::install_github("bnprks/BPCells/r", upgrade = "never"), silent = TRUE)
          try(devtools::install_github("cole-trapnell-lab/monocle3", upgrade = "never"), silent = TRUE)

          message("Optional backend status - monocle3 installed: ", requireNamespace("monocle3", quietly = TRUE))
        shell: Rscript {0}
      - name: Install GLEAM package
        run: R CMD INSTALL .
      - name: Run optional trajectory tests
        run: |
          library(GLEAM)
          testthat::test_dir("tests/testthat", reporter = "summary", filter = "trajectory-monocle3|trajectory-optional-deps")
        shell: Rscript {0}
